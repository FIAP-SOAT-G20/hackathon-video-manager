name: cd/deploy-ecr

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write
  actions: write

env:
  ECR_REPOSITORY_VIDEO_MANAGER: hackathon-video-manager

jobs:
  build-and-push:
    name: CD - Deploy Video Manager to ECR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    
    outputs:
      image-uri: ${{ steps.output.outputs.image-uri }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Create ECR repository if it doesn't exist
        run: |
          aws ecr describe-repositories --repository-names ${{ secrets.ECR_REPOSITORY_VIDEO_MANAGER }} --region ${{ secrets.AWS_REGION }} || \
          aws ecr create-repository \
            --repository-name ${{ secrets.ECR_REPOSITORY_VIDEO_MANAGER }} \
            --image-scanning-configuration scanOnPush=true \
            --image-tag-mutability MUTABLE \
            --region ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          provenance: false
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_VIDEO_MANAGER }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_VIDEO_MANAGER }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image URI
        id: output
        run: echo "image-uri=${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_VIDEO_MANAGER }}:latest" >> $GITHUB_OUTPUT
      
      - name: Update GitHub Repository Env using gh env
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh env set VIDEO_MANAGER_IMAGE_URI -b "${{ steps.output.outputs.image-uri }}" --repo ${{ github.repository }}
